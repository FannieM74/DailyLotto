services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - dailylotto-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://163.245.192.177:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  dailylotto-data:
