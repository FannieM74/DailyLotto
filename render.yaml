services:
  - type: web
    name: dailylotto-api
    runtime: python
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 8000
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
